services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:v1.56.1
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_KEY}
      - AUTH_PROVIDER=credentials
      - BASE_URL=https://home.${BASE_DOMAIN}
      - TZ=${TZ}
      - DATABASE_DIALECT=postgres
      - DATABASE_HOST=homarr-db
      - DATABASE_PORT=5432
      - DATABASE_NAME=homarr
      - DATABASE_USER=homarr
      - DATABASE_PASSWORD=${HOMARR_DB_PASS}
    volumes:
      - /mnt/swarm-shared/management/homarr/appdata:/appdata
    networks:
      - traefik_proxy
      - management_internal
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          memory: 2G
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.homarr.rule=Host(`home.${BASE_DOMAIN}`)"
        - "traefik.http.routers.homarr.entrypoints=websecure"
        - "traefik.http.routers.homarr.tls.certresolver=letsencrypt"
        - "traefik.http.routers.homarr.middlewares=authelia@swarm"
        - "traefik.http.services.homarr.loadbalancer.server.port=7575"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # Prefer Homarr's container health endpoint and gracefully fall back to '/'
      # for compatibility across image variants.
      test: ["CMD", "node", "-e", "const http=require('http');const ok=s=>s>=200&&s<400;const chk=(p,n)=>http.get('http://127.0.0.1:7575'+p,r=>ok(r.statusCode)?process.exit(0):n?chk('/',0):process.exit(1)).on('error',()=>n?chk('/',0):process.exit(1));chk('/status',1)"]
      start_period: 90s
      interval: 30s
      timeout: 10s
      retries: 5

  homarr-db:
    image: postgres:18.3-alpine
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=homarr
      - POSTGRES_PASSWORD=${HOMARR_DB_PASS}
      - POSTGRES_DB=homarr
    volumes:
      - homarr_db_data:/var/lib/postgresql/data
    networks:
      - management_internal
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
          - node.hostname == app-worker-1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: any
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homarr"]
      interval: 15s
      timeout: 5s
      retries: 5

  portainer-server:
    image: portainer/portainer-ee:2.39.1
    command: -H tcp://tasks.portainer-agent:9001 --tlsskipverify --admin-password "${PORTAINER_ADMIN_PASSWORD_HASH}"
    ports:
      - target: 9000
        published: 9000
        protocol: tcp
        mode: host
    volumes:
      - portainer_db:/data
    networks:
      - traefik_proxy
      - portainer_agent
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      placement:
        constraints:
          - node.labels.location == cloud
          - node.hostname == app-worker-1
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.portainer.rule=Host(`portainer.${BASE_DOMAIN}`)"
        - "traefik.http.routers.portainer.entrypoints=websecure"
        - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
        - "traefik.http.routers.portainer.middlewares=authelia@swarm"
        - "traefik.http.services.portainer.loadbalancer.server.port=9000"
        # portainer-api Traefik router removed: CI automation now accesses
        # Portainer directly via its Tailscale IP (http://<ts_ip>:9000/api).
        # WireGuard provides transport encryption — no public endpoint or IP
        # allowlist needed. Use portainer.${BASE_DOMAIN} (Authelia-protected)
        # for browser access.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  portainer-agent:
    image: portainer/agent:2.39.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - portainer_agent
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      mode: global
      resources:
        limits:
          memory: 128M
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_proxy:
    external: true
  portainer_agent:
    driver: overlay
    attachable: false
  management_internal:
    driver: overlay
    attachable: false

volumes:
  portainer_db:
    driver: local
  homarr_db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/app_data/local/management/homarr-db
