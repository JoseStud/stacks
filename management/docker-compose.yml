services:
  homarr:
    image: ghcr.io/homarr-org/homarr:latest
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_KEY}
      - AUTH_PROVIDER=credentials
      - BASE_URL=https://home.${BASE_DOMAIN}
      - TZ=${TZ}
    volumes:
      - /mnt/swarm-shared/management/homarr/appdata:/appdata
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.homarr.rule=Host(`home.${BASE_DOMAIN}`)"
        - "traefik.http.routers.homarr.entrypoints=websecure"
        - "traefik.http.routers.homarr.tls.certresolver=letsencrypt"
        - "traefik.http.routers.homarr.middlewares=authelia@docker"
        - "traefik.http.services.homarr.loadbalancer.server.port=7575"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7575/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  portainer-server:
    image: portainer/portainer-ce:lts
    command: -H tcp://tasks.portainer-agent:9001 --tlsskipverify --admin-password "${PORTAINER_ADMIN_PASSWORD_HASH}"
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - portainer_db:/data
    networks:
      - traefik_proxy
      - portainer_agent
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      placement:
        constraints:
          - node.labels.location == cloud
          - node.hostname == app-worker-1
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.portainer.rule=Host(`portainer.${BASE_DOMAIN}`)"
        - "traefik.http.routers.portainer.entrypoints=websecure"
        - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
        - "traefik.http.routers.portainer.middlewares=authelia@docker"
        - "traefik.http.services.portainer.loadbalancer.server.port=9000"
        # Automation-only API entrypoint (Terraform Cloud Agent + private webhook caller)
        - "traefik.http.routers.portainer-api.rule=Host(`portainer-api.${BASE_DOMAIN}`) && PathPrefix(`/api`)"
        - "traefik.http.routers.portainer-api.entrypoints=websecure"
        - "traefik.http.routers.portainer-api.tls.certresolver=letsencrypt"
        - "traefik.http.routers.portainer-api.middlewares=portainer-api-allow,portainer-api-ratelimit,portainer-api-secure-headers"
        - "traefik.http.routers.portainer-api.service=portainer"
        - "traefik.http.middlewares.portainer-api-allow.ipallowlist.sourcerange=${PORTAINER_AUTOMATION_ALLOWED_CIDRS}"
        - "traefik.http.middlewares.portainer-api-ratelimit.ratelimit.average=30"
        - "traefik.http.middlewares.portainer-api-ratelimit.ratelimit.burst=60"
        - "traefik.http.middlewares.portainer-api-secure-headers.headers.forceSTSHeader=true"
        - "traefik.http.middlewares.portainer-api-secure-headers.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.portainer-api-secure-headers.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.portainer-api-secure-headers.headers.stsPreload=true"
        - "traefik.http.middlewares.portainer-api-secure-headers.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.portainer-api-secure-headers.headers.browserXssFilter=true"
        - "traefik.http.middlewares.portainer-api-secure-headers.headers.frameDeny=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  portainer-agent:
    image: portainer/agent:lts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - portainer_agent
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      mode: global
      resources:
        limits:
          memory: 128M
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_proxy:
    external: true
  portainer_agent:
    driver: overlay
    attachable: false

volumes:
  portainer_db:
    driver: local
