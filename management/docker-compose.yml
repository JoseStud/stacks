services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_KEY}
      - AUTH_PROVIDER=credentials
      - BASE_URL=https://home.${BASE_DOMAIN}
      - TZ=${TZ}
    volumes:
      - /mnt/swarm-shared/management/homarr/appdata:/appdata
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          memory: 2G
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.homarr.rule=Host(`home.${BASE_DOMAIN}`)"
        - "traefik.http.routers.homarr.entrypoints=websecure"
        - "traefik.http.routers.homarr.tls.certresolver=letsencrypt"
        - "traefik.http.routers.homarr.middlewares=authelia@docker"
        - "traefik.http.services.homarr.loadbalancer.server.port=7575"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # Homarr images may not include curl; use the bundled Node runtime for health probing.
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:7575/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  portainer-server:
    image: portainer/portainer-ee:lts
    command: -H tcp://tasks.portainer-agent:9001 --tlsskipverify --admin-password "${PORTAINER_ADMIN_PASSWORD_HASH}"
    ports:
      - target: 9000
        published: 9000
        protocol: tcp
        mode: host
    volumes:
      - portainer_db:/data
    networks:
      - traefik_proxy
      - portainer_agent
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      placement:
        constraints:
          - node.labels.location == cloud
          - node.hostname == app-worker-1
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.portainer.rule=Host(`portainer.${BASE_DOMAIN}`)"
        - "traefik.http.routers.portainer.entrypoints=websecure"
        - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
        - "traefik.http.routers.portainer.middlewares=authelia@docker"
        - "traefik.http.services.portainer.loadbalancer.server.port=9000"
        # portainer-api Traefik router removed: CI automation now accesses
        # Portainer directly via its Tailscale IP (http://<ts_ip>:9000/api).
        # WireGuard provides transport encryption — no public endpoint or IP
        # allowlist needed. Use portainer.${BASE_DOMAIN} (Authelia-protected)
        # for browser access.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  portainer-agent:
    image: portainer/agent:lts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - portainer_agent
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      mode: global
      resources:
        limits:
          memory: 128M
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_proxy:
    external: true
  portainer_agent:
    driver: overlay
    attachable: false

volumes:
  portainer_db:
    driver: local
