version: '3.8'
services:
  gluetun:
    image: qmcgaw/gluetun
    
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8090:8090" # qbittorrent
    volumes:
      - ./gluetun/custom-ovpn-files:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=openvpn
    
    healthcheck:
      test: ["CMD", "curl", "-s", "https://cloudflare.com/cdn-cgi/trace"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - traefik_proxy
      - internal
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    
    network_mode: "service:gluetun"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Etc/UTC
      - WEBUI_PORT=8090
    volumes:
      - ./data/qbittorrent/config:/config
      - ./data/downloads:/downloads
    
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      replicas: 0 # Run manually on local machine, swarm networking doesn't allow 'service:x' cleanly without host constraints. Or use placement.
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.role == worker
          - node.labels.location == local
      restart_policy:
        condition: on-failure
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/"]
      interval: 30s
      timeout: 10s
      retries: 3
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Etc/UTC
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/media:/data/media
    
    networks:
      - traefik_proxy
      - internal
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.role == worker
          - node.labels.location == local
      restart_policy:
        condition: on-failure
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Etc/UTC
    volumes:
      - ./data/sonarr/config:/config
      - ./data/media/tv:/tv
      - ./data/downloads:/downloads
    
    networks:
      - traefik_proxy
      - internal
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Etc/UTC
    volumes:
      - ./data/radarr/config:/config
      - ./data/media/movies:/movies
      - ./data/downloads:/downloads
    
    networks:
      - traefik_proxy
      - internal
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Etc/UTC
    volumes:
      - ./data/prowlarr/config:/config
    
    networks:
      - traefik_proxy
      - internal

networks:
  traefik_proxy:
    external: true
  internal:
    driver: bridge
