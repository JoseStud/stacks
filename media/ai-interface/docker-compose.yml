services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    environment:
      - OLLAMA_BASE_URL=http://${ARCH_PC_IP:-192.168.1.100}:11434
      # Keep metadata out of SQLite-on-GlusterFS to prevent migration corruption loops.
      - DATABASE_URL=postgresql://openwebui:${OPENWEBUI_DB_PASS}@open-webui-db:5432/openwebui
      - TZ=${TZ}
    volumes:
      - /mnt/swarm-shared/ai-interface/open-webui:/app/backend/data
    networks:
      - traefik_proxy
      - openwebui_internal
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.openwebui.rule=Host(`ai.${BASE_DOMAIN}`)"
        - "traefik.http.routers.openwebui.entrypoints=websecure"
        - "traefik.http.routers.openwebui.tls.certresolver=letsencrypt"
        - "traefik.http.routers.openwebui.middlewares=authelia@docker"
        - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      start_period: 5m
      interval: 30s
      timeout: 10s
      retries: 3

  open-webui-db:
    image: postgres:18.3-alpine
    stop_grace_period: 2m
    environment:
      - POSTGRES_USER=openwebui
      - POSTGRES_PASSWORD=${OPENWEBUI_DB_PASS}
      - POSTGRES_DB=openwebui
    volumes:
      # Pin PGDATA to node-local storage; avoid fsync latency/corruption on shared FS.
      - openwebui_db_data:/var/lib/postgresql/data
    networks:
      - openwebui_internal
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
          - node.hostname == app-worker-2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwebui"]
      start_period: 2m
      interval: 15s
      timeout: 5s
      retries: 5

  openclaw:
    image: ghcr.io/openclaw/openclaw:v2026.3.13-1
    environment:
      # Keep V8 heap below container memory limit to avoid repeated OOM restarts.
      - NODE_OPTIONS=--max-old-space-size=1536
    volumes:
      - /mnt/swarm-shared/ai-interface/openclaw/config:/app/config
      - /mnt/swarm-shared/ai-interface/openclaw/config:/root/.openclaw
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          cpus: "1.0"
          memory: 2G
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.openclaw.rule=Host(`gateway.${BASE_DOMAIN}`)"
        - "traefik.http.routers.openclaw.entrypoints=websecure"
        - "traefik.http.routers.openclaw.tls.certresolver=letsencrypt"
        - "traefik.http.routers.openclaw.middlewares=authelia@docker"
        - "traefik.http.services.openclaw.loadbalancer.server.port=8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_proxy:
    external: true
  openwebui_internal:
    driver: overlay
    attachable: false

volumes:
  openwebui_db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/app_data/local/ai-interface/open-webui-db
