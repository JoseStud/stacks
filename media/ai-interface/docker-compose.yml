services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      - OLLAMA_BASE_URL=http://${ARCH_PC_IP:-192.168.1.100}:11434
      - TZ=${TZ}
    volumes:
      - /mnt/swarm-shared/ai-interface/open-webui:/app/backend/data
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          memory: 1G
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.openwebui.rule=Host(`ai.${BASE_DOMAIN}`)"
        - "traefik.http.routers.openwebui.entrypoints=websecure"
        - "traefik.http.routers.openwebui.tls.certresolver=letsencrypt"
        - "traefik.http.routers.openwebui.middlewares=authelia@docker"
        - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  openclaw-gateway:
    image: openclaw/gateway:latest
    volumes:
      - /mnt/swarm-shared/ai-interface/openclaw/config:/app/config
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.openclaw.rule=Host(`gateway.${BASE_DOMAIN}`)"
        - "traefik.http.routers.openclaw.entrypoints=websecure"
        - "traefik.http.routers.openclaw.tls.certresolver=letsencrypt"
        - "traefik.http.routers.openclaw.middlewares=authelia@docker"
        - "traefik.http.services.openclaw.loadbalancer.server.port=8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  openclaw-cli:
    image: openclaw/cli:latest
    volumes:
      - /mnt/swarm-shared/ai-interface/openclaw/config:/root/.openclaw
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_proxy:
    external: true
