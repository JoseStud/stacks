---
# Authelia Users Database — File-based Authentication Backend
# Docs: https://www.authelia.com/reference/guides/passwords/
#
# Generate password hashes with:
#   docker run --rm authelia/authelia:latest authelia crypto hash generate argon2 --password 'your-password'
#
# This file is only a bootstrap placeholder.
# The real runtime users database is rendered from:
#   /stacks/identity -> AUTHELIA_USERS_DATABASE_YAML
# via stacks/auth/config/users_database.yml.tmpl and then copied to:
#   /mnt/swarm-shared/auth/authelia/config/users_database.yml
# by the Ansible-managed Infisical Agent helper.

users:
  authelia:
    disabled: true
    displayname: 'Authelia Admin'
    password: '$argon2id$v=19$m=65536,t=3,p=4$ODQ0NTg0ODQ0NTg0ODQ0NQ$ODQ0NTg0ODQ0NTg0ODQ0NQ'
    email: 'authelia@example.com'
    groups:
      - admins
  # Example user — uncomment and update with real values:
  #
  # admin:
  #   disabled: false
  #   displayname: 'Admin User'
  #   email: 'admin@example.com'
  #   password: '$argon2id$v=19$m=65536,t=3,p=4$REPLACE_WITH_GENERATED_HASH'
  #   groups:
  #     - 'admins'
