---
# Authelia Users Database — File-based Authentication Backend
# Docs: https://www.authelia.com/reference/guides/passwords/
#
# Generate password hashes with:
#   docker run --rm authelia/authelia:latest authelia crypto hash generate argon2 --password 'your-password'
#
# After generating a hash, replace the placeholder below and add your user(s).
# This file is bind-mounted into the Authelia container at /config/users_database.yml
# and is deployed to /mnt/swarm-shared/auth/authelia/config/ on GlusterFS.

users: {}
  # Example user — uncomment and update with real values:
  #
  # admin:
  #   disabled: false
  #   displayname: 'Admin User'
  #   email: 'admin@example.com'
  #   password: '$argon2id$v=19$m=65536,t=3,p=4$REPLACE_WITH_GENERATED_HASH'
  #   groups:
  #     - 'admins'
