---
# Authelia Configuration
# Docs: https://www.authelia.com/configuration/
#
# Secrets are injected via AUTHELIA_* environment variables from docker-compose.yml.
# This file defines structure and non-secret settings only.
# Variables overridden by env vars: JWT_SECRET, SESSION_SECRET, STORAGE_POSTGRES_*,
#   NOTIFIER_SMTP_*, IDENTITY_PROVIDERS_OIDC_HMAC_SECRET,
#   IDENTITY_PROVIDERS_OIDC_ISSUER_PRIVATE_KEY

###############################################################################
# Server
###############################################################################
server:
  address: 'tcp://:9091'

###############################################################################
# Log
###############################################################################
log:
  level: 'info'
  format: 'json'

###############################################################################
# TOTP — Time-based One-Time Password (2FA)
###############################################################################
totp:
  issuer: 'authelia.com'  # Override at runtime via AUTHELIA_TOTP_ISSUER env var
  period: 30
  skew: 1

###############################################################################
# WebAuthn — Hardware key / passkey support (2FA)
###############################################################################
webauthn:
  disable: false
  display_name: 'Authelia'
  attestation_conveyance_preference: 'indirect'
  user_verification: 'preferred'
  timeout: '60s'

###############################################################################
# Authentication Backend — File-based
###############################################################################
authentication_backend:
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: 'argon2id'
      iterations: 3
      memory: 65536  # 64 MB
      parallelism: 4
      key_length: 32
      salt_length: 16

###############################################################################
# Session
###############################################################################
session:
  name: 'authelia_session'
  same_site: 'lax'
  inactivity: '5m'
  expiration: '1h'
  remember_me: '1M'
  cookies:
    - domain: 'example.com'  # Override: set AUTHELIA_SESSION_COOKIES_0_DOMAIN env var
      authelia_url: 'https://auth.example.com'  # Override: AUTHELIA_SESSION_COOKIES_0_AUTHELIA_URL
      default_redirection_url: 'https://home.example.com'  # Override: AUTHELIA_SESSION_COOKIES_0_DEFAULT_REDIRECTION_URL

###############################################################################
# Regulation — Brute-force protection
###############################################################################
regulation:
  max_retries: 3
  find_time: '2m'
  ban_time: '5m'

###############################################################################
# Storage — PostgreSQL
# Connection details injected via env vars:
#   AUTHELIA_STORAGE_POSTGRES_HOST, _PORT, _DATABASE, _USERNAME, _PASSWORD
###############################################################################
storage:
  postgres:
    address: 'tcp://authelia-db:5432'
    database: 'authelia'
    username: 'authelia'
    # password: injected via AUTHELIA_STORAGE_POSTGRES_PASSWORD env var

###############################################################################
# Notifier — SMTP (Gmail)
# Credentials injected via env vars:
#   AUTHELIA_NOTIFIER_SMTP_HOST, _PORT, _USERNAME, _PASSWORD, _SENDER
###############################################################################
notifier:
  disable_startup_check: false
  smtp:
    address: 'submissions://smtp.gmail.com:465'
    # username: injected via AUTHELIA_NOTIFIER_SMTP_USERNAME
    # password: injected via AUTHELIA_NOTIFIER_SMTP_PASSWORD
    sender: 'Authelia <noreply@example.com>'  # Override: AUTHELIA_NOTIFIER_SMTP_SENDER
    subject: '[Authelia] {title}'
    startup_check_address: 'test@authelia.com'
    tls:
      skip_verify: false

###############################################################################
# Access Control
###############################################################################
access_control:
  default_policy: 'two_factor'
  rules:
    # Authelia's own endpoints must be accessible without auth
    - domain: 'auth.example.com'  # Override via access_control env or keep in sync with BASE_DOMAIN
      policy: 'bypass'
      resources:
        - '^/api/(verify|healthz|configuration)([/?].*)?$'

###############################################################################
# Identity Providers — OpenID Connect (for Grafana SSO)
# HMAC secret and issuer private key injected via env vars:
#   AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET
#   AUTHELIA_IDENTITY_PROVIDERS_OIDC_JWKS_0_KEY
###############################################################################
identity_providers:
  oidc:
    # hmac_secret: injected via AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET
    jwks:
      - key_id: 'main'
        algorithm: 'RS256'
        use: 'sig'
        # key: injected via AUTHELIA_IDENTITY_PROVIDERS_OIDC_JWKS_0_KEY (RSA 4096 PEM)
    clients:
      - client_id: 'grafana'
        client_name: 'Grafana'
        # client_secret: argon2id hash of the plaintext secret stored in Infisical
        # Generate hash: authelia crypto hash generate argon2 --password '<GF_OIDC_CLIENT_SECRET plaintext>'
        client_secret: '$argon2id$v=19$m=65536,t=3,p=4$PLACEHOLDER_GENERATE_AND_REPLACE'
        public: false
        authorization_policy: 'two_factor'
        redirect_uris:
          - 'https://grafana.example.com/login/generic_oauth'  # Update domain to match BASE_DOMAIN
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
          - 'groups'
        userinfo_signed_response_alg: 'none'
        token_endpoint_auth_method: 'client_secret_basic'
