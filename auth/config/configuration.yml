---
# Authelia Configuration
# Docs: https://www.authelia.com/configuration/
#
# Secrets are injected via AUTHELIA_* environment variables from docker-compose.yml.
# This file defines structure and non-secret settings only.
# Variables overridden by env vars: JWT_SECRET, SESSION_SECRET,
#   STORAGE_POSTGRES_PASSWORD, STORAGE_ENCRYPTION_KEY, NOTIFIER_SMTP_*,
#   IDENTITY_PROVIDERS_OIDC_HMAC_SECRET
#
# Authelia's template filter is enabled at runtime for values nested inside lists,
# which Authelia's native environment method doesn't support reliably.

###############################################################################
# Server
###############################################################################
server:
  address: 'tcp://:9091'

###############################################################################
# Log
###############################################################################
log:
  level: 'info'
  format: 'json'

###############################################################################
# TOTP — Time-based One-Time Password (2FA)
###############################################################################
totp:
  issuer: 'authelia.com'  # Override at runtime via AUTHELIA_TOTP_ISSUER env var
  period: 30
  skew: 1

###############################################################################
# WebAuthn — Hardware key / passkey support (2FA)
###############################################################################
webauthn:
  disable: false
  display_name: 'Authelia'
  attestation_conveyance_preference: 'indirect'
  user_verification: 'preferred'
  timeout: '60s'

###############################################################################
# Authentication Backend — File-based
###############################################################################
authentication_backend:
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: 'argon2id'
      iterations: 3
      memory: 65536  # 64 MB
      parallelism: 4
      key_length: 32
      salt_length: 16

###############################################################################
# Session
###############################################################################
session:
  name: 'authelia_session'
  same_site: 'lax'
  inactivity: '5m'
  expiration: '1h'
  remember_me: '1M'
  cookies:
    - domain: {{ mustEnv "AUTH_SESSION_COOKIES_0_DOMAIN" | squote }}
      authelia_url: {{ mustEnv "AUTH_SESSION_COOKIES_0_AUTHELIA_URL" | squote }}
      default_redirection_url: {{ mustEnv "AUTH_SESSION_COOKIES_0_DEFAULT_REDIRECTION_URL" | squote }}

###############################################################################
# Regulation — Brute-force protection
###############################################################################
regulation:
  max_retries: 3
  find_time: '2m'
  ban_time: '5m'

###############################################################################
# Storage — PostgreSQL
# Authelia 4.38+ requires the unified address key; do not also set legacy
# AUTHELIA_STORAGE_POSTGRES_HOST or AUTHELIA_STORAGE_POSTGRES_PORT env vars.
# Only the password is injected via env var.
###############################################################################
storage:
  postgres:
    # Use the local service name on the shared overlay network.
    address: 'tcp://authelia-db:5432'
    database: 'authelia'
    username: 'authelia'
    # password: injected via AUTHELIA_STORAGE_POSTGRES_PASSWORD env var

###############################################################################
# Notifier — SMTP (Gmail)
# Credentials injected via env vars:
#   AUTHELIA_NOTIFIER_SMTP_USERNAME, _PASSWORD, _SENDER
###############################################################################
notifier:
  disable_startup_check: false
  smtp:
    address: 'submissions://smtp.gmail.com:465'
    # username: injected via AUTHELIA_NOTIFIER_SMTP_USERNAME
    # password: injected via AUTHELIA_NOTIFIER_SMTP_PASSWORD
    sender: 'Authelia <noreply@example.com>'  # Override: AUTHELIA_NOTIFIER_SMTP_SENDER
    subject: '[Authelia] {title}'
    startup_check_address: 'test@authelia.com'
    tls:
      skip_verify: false

###############################################################################
# Access Control
###############################################################################
access_control:
  default_policy: 'two_factor'
  rules:
    # Authelia's own endpoints must be accessible without auth
    - domain: {{ printf "auth.%s" (mustEnv "BASE_DOMAIN") | squote }}
      policy: 'bypass'
      resources:
        - '^/api/(verify|healthz|configuration)([/?].*)?$'

###############################################################################
# Identity Providers — OpenID Connect (for Grafana SSO)
# HMAC secret is injected via env var.
# List-based OIDC values are rendered via Authelia's template filter:
#   AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET
#   AUTH_OIDC_JWKS_0_KEY
#   AUTH_GRAFANA_OIDC_CLIENT_SECRET_HASH
###############################################################################
identity_providers:
  oidc:
    # hmac_secret: injected via AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET
    claims_policies:
      grafana:
        id_token:
          - 'groups'
    jwks:
      - key_id: 'main'
        algorithm: 'RS256'
        use: 'sig'
        key: {{ mustEnv "AUTH_OIDC_JWKS_0_KEY" | mindent 10 "|" | msquote }}
    clients:
      - client_id: 'grafana'
        client_name: 'Grafana'
        client_secret: {{ mustEnv "AUTH_GRAFANA_OIDC_CLIENT_SECRET_HASH" | squote }}
        public: false
        authorization_policy: 'two_factor'
        claims_policy: 'grafana'
        redirect_uris:
          - {{ printf "https://grafana.%s/login/generic_oauth" (mustEnv "BASE_DOMAIN") | squote }}
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
          - 'groups'
        userinfo_signed_response_alg: 'none'
        token_endpoint_auth_method: 'client_secret_basic'
