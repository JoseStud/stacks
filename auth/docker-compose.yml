services:
  authelia:
    image: authelia/authelia:4.38.19
    environment:
      - BASE_DOMAIN=${BASE_DOMAIN}
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_POSTGRES_DATABASE=authelia
      - AUTHELIA_STORAGE_POSTGRES_USERNAME=authelia
      - AUTHELIA_STORAGE_POSTGRES_ADDRESS=tcp://authelia-db:5432
      - AUTHELIA_STORAGE_POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - TZ=${TZ}
      # SMTP Notifier (Gmail)
      - AUTHELIA_NOTIFIER_SMTP_USERNAME=${AUTHELIA_NOTIFIER_SMTP_USERNAME}
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD=${AUTHELIA_NOTIFIER_SMTP_PASSWORD}
      - AUTHELIA_NOTIFIER_SMTP_SENDER=${AUTHELIA_NOTIFIER_SMTP_SENDER}
      # OIDC Provider
      - AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET=${AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET}
      - AUTH_OIDC_JWKS_0_KEY=${AUTH_OIDC_JWKS_0_KEY}
      - AUTH_GRAFANA_OIDC_CLIENT_SECRET_HASH=${AUTH_GRAFANA_OIDC_CLIENT_SECRET_HASH}
      # Session cookie values rendered into configuration.yml via the template filter
      - AUTH_SESSION_COOKIES_0_DOMAIN=${AUTH_SESSION_COOKIES_0_DOMAIN}
      - AUTH_SESSION_COOKIES_0_AUTHELIA_URL=${AUTH_SESSION_COOKIES_0_AUTHELIA_URL}
      - AUTH_SESSION_COOKIES_0_DEFAULT_REDIRECTION_URL=${AUTH_SESSION_COOKIES_0_DEFAULT_REDIRECTION_URL}
      # TOTP issuer
      - AUTHELIA_TOTP_ISSUER=${AUTHELIA_TOTP_ISSUER}
      - X_AUTHELIA_CONFIG=/config/configuration.yml
      - X_AUTHELIA_CONFIG_FILTERS=template
    volumes:
      - /mnt/swarm-shared/auth/authelia/config:/config
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Allow slow PostgreSQL recovery/placement events during Swarm startup.
        max_attempts="${AUTHELIA_DB_WAIT_MAX_ATTEMPTS:-120}"
        sleep_seconds="${AUTHELIA_DB_WAIT_SLEEP_SECONDS:-20}"
        attempt=1
        until authelia storage schema-info >/dev/null 2>&1; do
          if [ "$$attempt" -ge "$$max_attempts" ]; then
            echo "Authelia startup aborted: Postgres is not ready after $${max_attempts} attempts."
            exit 1
          fi
          echo "Waiting for Postgres (attempt $${attempt}/$${max_attempts})..."
          attempt=$$((attempt + 1))
          sleep "$$sleep_seconds"
        done
        exec authelia
    networks:
      - traefik_proxy
      - authelia_internal
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.authelia.rule=Host(`auth.${BASE_DOMAIN}`)"
        - "traefik.http.routers.authelia.entrypoints=websecure"
        - "traefik.http.routers.authelia.tls.certresolver=letsencrypt"
        - "traefik.http.services.authelia.loadbalancer.server.port=9091"
        - "traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/verify?rd=https%3A%2F%2Fauth.${BASE_DOMAIN}%2F"
        - "traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true"
        - "traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  authelia-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=authelia
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=authelia
    volumes:
      - authelia_db_data:/var/lib/postgresql/data
    networks:
      - authelia_internal
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
          - node.hostname == app-worker-1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authelia"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  traefik_proxy:
    external: true
  authelia_internal:
    driver: overlay
    attachable: false

volumes:
  authelia_db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/app_data/local/auth/authelia-db
