services:
  authelia:
    image: authelia/authelia
    environment:
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_POSTGRES_HOST=authelia-db
      - AUTHELIA_STORAGE_POSTGRES_PORT=5432
      - AUTHELIA_STORAGE_POSTGRES_DATABASE=authelia
      - AUTHELIA_STORAGE_POSTGRES_USERNAME=authelia
      - AUTHELIA_STORAGE_POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=${TZ}
      # SMTP Notifier (Gmail)
      - AUTHELIA_NOTIFIER_SMTP_USERNAME=${AUTHELIA_NOTIFIER_SMTP_USERNAME}
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD=${AUTHELIA_NOTIFIER_SMTP_PASSWORD}
      - AUTHELIA_NOTIFIER_SMTP_SENDER=${AUTHELIA_NOTIFIER_SMTP_SENDER}
      # OIDC Provider
      - AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET=${AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET}
      - AUTHELIA_IDENTITY_PROVIDERS_OIDC_JWKS_0_KEY=${AUTHELIA_IDENTITY_PROVIDERS_OIDC_JWKS_0_KEY}
      # Session cookie domain (overrides configuration.yml)
      - AUTHELIA_SESSION_COOKIES_0_DOMAIN=${AUTHELIA_SESSION_COOKIES_0_DOMAIN}
      - AUTHELIA_SESSION_COOKIES_0_AUTHELIA_URL=${AUTHELIA_SESSION_COOKIES_0_AUTHELIA_URL}
      - AUTHELIA_SESSION_COOKIES_0_DEFAULT_REDIRECTION_URL=${AUTHELIA_SESSION_COOKIES_0_DEFAULT_REDIRECTION_URL}
      # TOTP issuer
      - AUTHELIA_TOTP_ISSUER=${AUTHELIA_TOTP_ISSUER}
    volumes:
      - /mnt/swarm-shared/auth/authelia/config:/config
    networks:
      - traefik_proxy
      - authelia_internal
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.authelia.rule=Host(`auth.${BASE_DOMAIN}`)"
        - "traefik.http.routers.authelia.entrypoints=websecure"
        - "traefik.http.routers.authelia.tls.certresolver=letsencrypt"
        - "traefik.http.services.authelia.loadbalancer.server.port=9091"
        - "traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/verify?rd=https%3A%2F%2Fauth.${BASE_DOMAIN}%2F"
        - "traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true"
        - "traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  authelia-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=authelia
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=authelia
    volumes:
      - authelia_db_data:/var/lib/postgresql/data
    networks:
      - authelia_internal
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authelia"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  traefik_proxy:
    external: true
  authelia_internal:
    driver: overlay
    attachable: false

volumes:
  authelia_db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/swarm-shared/auth/authelia-db
