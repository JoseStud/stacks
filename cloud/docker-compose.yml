version: '3.8'

services:
  filebrowser:
    image: filebrowser/filebrowser:v2-s6
    volumes:
      - /mnt/swarm-shared:/srv:ro
      - filebrowser_db:/database
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.filebrowser.rule=Host(`files.${BASE_DOMAIN}`)"
        - "traefik.http.routers.filebrowser.entrypoints=websecure"
        - "traefik.http.routers.filebrowser.middlewares=authelia@docker"
        - "traefik.http.services.filebrowser.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  traefik_proxy:
    external: true

volumes:
  filebrowser_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/swarm-shared/cloud/filebrowser/database
