services:
  prometheus:
    image: prom/prometheus:v3.10.0
    volumes:
      - /mnt/swarm-shared/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /mnt/swarm-shared/observability/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
          - node.hostname == app-worker-2
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prometheus.rule=Host(`prometheus.${BASE_DOMAIN}`)"
        - "traefik.http.routers.prometheus.entrypoints=websecure"
        - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
        - "traefik.http.routers.prometheus.middlewares=authelia@swarm"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:3.6.7
    volumes:
      - /mnt/swarm-shared/observability/loki:/etc/loki:ro
      # Keep Loki WAL/TSDB on the node-local block volume; GlusterFS adds fsync latency.
      - loki_data:/tmp/loki
    command:
      - '-config.file=/etc/loki/loki-config.yaml'
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
          - node.hostname == app-worker-1
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-target=healthcheck", "-config.file=/etc/loki/loki-config.yaml"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  promtail:
    image: grafana/promtail:3.6.7
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/swarm-shared/observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      mode: global
      placement:
        constraints:
          - node.labels.location == cloud
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
      restart_policy:
        condition: any
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9080/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  node-exporter:
    image: prom/node-exporter:v1.10.2
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      mode: global
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:12.4.1
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.${BASE_DOMAIN}
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=grafana-db:5432
      - GF_DATABASE_NAME=grafana
      - GF_DATABASE_USER=grafana
      - GF_DATABASE_PASSWORD=${GF_DB_PASS}
      - GF_DATABASE_SSL_MODE=disable
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Authelia
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GF_OIDC_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GF_OIDC_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email groups
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://auth.${BASE_DOMAIN}/api/oidc/authorization
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://auth.${BASE_DOMAIN}/api/oidc/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://auth.${BASE_DOMAIN}/api/oidc/userinfo
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(groups[*], 'admins') && 'Admin' || 'Viewer'
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - TZ=${TZ}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - traefik_proxy
      - observability_internal
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
          - node.hostname == app-worker-2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`grafana.${BASE_DOMAIN}`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
        - "traefik.http.routers.grafana.middlewares=authelia@swarm"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana-db:
    image: postgres:18.3-alpine
    stop_grace_period: 2m
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=grafana
      - POSTGRES_PASSWORD=${GF_DB_PASS}
      - POSTGRES_DB=grafana
    volumes:
      # Keep PostgreSQL on the node-local block volume; GlusterFS adds fsync latency.
      - grafana_db_data:/var/lib/postgresql/data
    networks:
      - observability_internal
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
          - node.hostname == app-worker-2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grafana"]
      start_period: 2m
      interval: 15s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.31.1
    volumes:
      - /mnt/swarm-shared/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.location == cloud
          - node.hostname == app-worker-2
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.${BASE_DOMAIN}`)"
        - "traefik.http.routers.alertmanager.entrypoints=websecure"
        - "traefik.http.routers.alertmanager.tls.certresolver=letsencrypt"
        - "traefik.http.routers.alertmanager.middlewares=authelia@swarm"
        - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  traefik_proxy:
    external: true
  observability_internal:
    driver: overlay
    attachable: false

volumes:
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/swarm-shared/observability/prometheus_data
  loki_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/app_data/local/observability/loki_data
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/app_data/local/observability/grafana_data
  grafana_db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/app_data/local/observability/grafana-db
  alertmanager_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/swarm-shared/observability/alertmanager_data
