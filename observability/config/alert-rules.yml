# Prometheus Alert Rules
# Deployed to: /mnt/swarm-shared/observability/prometheus/alert-rules.yml
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules/

groups:
  - name: node-health
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "{{ $labels.job }} target {{ $labels.instance }} has been unreachable for more than 2 minutes."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% (current: {{ $value | printf \"%.1f\" }}%) on {{ $labels.instance }} for more than 5 minutes."

      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on {{ $labels.instance }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is above 85% (current: {{ $value | printf \"%.1f\" }}%)."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 85% (current: {{ $value | printf \"%.1f\" }}%) on {{ $labels.instance }} for more than 10 minutes."

  - name: service-health
    rules:
      - alert: PrometheusTargetMissing
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target {{ $labels.instance }} is missing"
          description: "The scrape target {{ $labels.job }}/{{ $labels.instance }} has been down for more than 5 minutes."

      - alert: TraefikHighErrorRate
        expr: sum(rate(traefik_entrypoint_requests_total{code=~"5.."}[5m])) / sum(rate(traefik_entrypoint_requests_total[5m])) * 100 > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik high 5xx error rate"
          description: "Traefik is returning more than 5% 5xx responses (current: {{ $value | printf \"%.1f\" }}%)."

  - name: recording-rules
    rules:
      # Synthetic lookup metric used by Docker Swarm Dashboard (ssc2, gnetId 11939).
      # Joins node_id / node_name onto node-exporter metrics via `* on(instance) group_left(node_name) node_meta`.
      # Inherits instance, node_id, and node_name labels from the node-exporter scrape targets.
      - record: node_meta
        expr: up{job="node-exporter"}
