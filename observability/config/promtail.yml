# Promtail Configuration
# Deployed to: /mnt/swarm-shared/observability/promtail/promtail.yml
# Docs: https://grafana.com/docs/loki/latest/send-data/promtail/configuration/
#
# Promtail runs globally (one per Swarm node) and ships Docker container logs to Loki.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: ''

scrape_configs:
  # Docker container logs via Docker daemon socket
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name as the primary label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: 'container'

      # Extract Swarm stack name from com.docker.stack.namespace label
      - source_labels: ['__meta_docker_container_label_com_docker_stack_namespace']
        target_label: 'stack'

      # Extract Swarm service name from com.docker.swarm.service.name label
      - source_labels: ['__meta_docker_container_label_com_docker_swarm_service_name']
        target_label: 'service'

      # Extract node ID from com.docker.swarm.node.id
      - source_labels: ['__meta_docker_container_label_com_docker_swarm_node_id']
        target_label: 'node_id'

      # Capture the compose service for non-swarm containers
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'

      # Use the Docker image name
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'

      # Drop containers with no stack label (infrastructure / system containers)
      # Uncomment below to only collect logs from Swarm stacks:
      # - source_labels: ['__meta_docker_container_label_com_docker_stack_namespace']
      #   action: drop
      #   regex: '^$'

    pipeline_stages:
      # Try to parse JSON logs (many containers output JSON)
      - json:
          expressions:
            level: level
            msg: msg
            message: message
            ts: time
            timestamp: timestamp
          source: ''
      # If JSON parsing extracted a level, promote it
      - labels:
          level:
      # If no JSON, fall back to regex for common log formats
      - match:
          selector: '{level=""}'
          stages:
            - regex:
                expression: '(?i)(?P<level>error|warn|info|debug)'
            - labels:
                level:
