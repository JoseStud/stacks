name: Stacks Dispatch Redeploy

on:
  workflow_run:
    workflows:
      - "Stacks CI"
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: stacks-dispatch-redeploy-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: true

jobs:
  runner-guard:
    runs-on: ubuntu-latest
    outputs:
      runner_label: ${{ steps.verify.outputs.runner_label }}

    steps:
      - name: Verify cloud runner label is configured
        id: verify
        env:
          CLOUD_STATIC_RUNNER_LABEL: ${{ vars.CLOUD_STATIC_RUNNER_LABEL }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOUD_STATIC_RUNNER_LABEL:-}" ]]; then
            echo "Missing required variable: CLOUD_STATIC_RUNNER_LABEL"
            exit 1
          fi
          echo "runner_label=${CLOUD_STATIC_RUNNER_LABEL}" >> "${GITHUB_OUTPUT}"

  dispatch-meta-request:
    needs: [runner-guard]
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ${{ needs.runner-guard.outputs.runner_label }}

    steps:
      - name: Checkout stacks repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq
          jq --version

      - name: Build redeploy request payload
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_REPOSITORY: ${{ github.event.workflow_run.repository.full_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: .github/scripts/plan_redeploy_payload.sh

      - name: Validate dispatch payload contract
        if: ${{ steps.plan.outputs.should_dispatch == 'true' }}
        env:
          PAYLOAD_SCHEMA_VERSION: ${{ steps.plan.outputs.schema_version }}
          PAYLOAD_STACKS_SHA: ${{ steps.plan.outputs.stacks_sha }}
          PAYLOAD_SOURCE_SHA: ${{ steps.plan.outputs.source_sha }}
          PAYLOAD_REASON: ${{ steps.plan.outputs.reason }}
          PAYLOAD_SOURCE_REPO: ${{ steps.plan.outputs.source_repo }}
          PAYLOAD_SOURCE_RUN_ID: ${{ steps.plan.outputs.source_run_id }}
        run: .github/scripts/validate_dispatch_payload.sh

      - name: Dispatch stacks-redeploy-intent-v5 to infra repo
        if: ${{ steps.plan.outputs.should_dispatch == 'true' }}
        env:
          INFRA_REPO: ${{ vars.INFRA_REPO || 'JoseStud/GoodOldMeServer' }}
          DISPATCH_TOKEN: ${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}
          SCHEMA_VERSION: ${{ steps.plan.outputs.schema_version }}
          STACKS_SHA: ${{ steps.plan.outputs.stacks_sha }}
          SOURCE_SHA: ${{ steps.plan.outputs.source_sha }}
          REASON: ${{ steps.plan.outputs.reason }}
          SOURCE_REPO: ${{ steps.plan.outputs.source_repo }}
          SOURCE_RUN_ID: ${{ steps.plan.outputs.source_run_id }}
        run: |
          set -euo pipefail

          if [[ -z "${DISPATCH_TOKEN:-}" ]]; then
            echo "Missing secret INFRA_REPO_DISPATCH_TOKEN."
            exit 1
          fi

          curl -sSfL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            "https://api.github.com/repos/${INFRA_REPO}/dispatches" \
            -d "$(cat <<EOF_JSON
          {
            "event_type": "stacks-redeploy-intent-v5",
            "client_payload": {
              "schema_version": "${SCHEMA_VERSION}",
              "stacks_sha": "${STACKS_SHA}",
              "source_sha": "${SOURCE_SHA}",
              "reason": "${REASON}",
              "source_repo": "${SOURCE_REPO}",
              "source_run_id": ${SOURCE_RUN_ID}
            }
          }
          EOF_JSON
          )"
