name: Stacks CI

on:
  pull_request:
    paths:
      - "stacks.yaml"
      - "**/docker-compose.yml"
      - "**/.env.tmpl"
      - "infisical-agent.yaml"
      - "auth/config/**"
      - "observability/config/**"
      - ".github/scripts/validate_stacks_manifest.sh"
      - ".github/workflows/stacks-ci.yml"
  push:
    branches:
      - main
    paths:
      - "stacks.yaml"
      - "**/docker-compose.yml"
      - "**/.env.tmpl"
      - "infisical-agent.yaml"
      - "auth/config/**"
      - "observability/config/**"
      - ".github/scripts/validate_stacks_manifest.sh"
      - ".github/workflows/stacks-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stacks-ci-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: true

jobs:
  validate-stacks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout stacks repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq + yq
        # NOTE: The stacks sub-repo cannot reference the parent's
        # .github/actions/bootstrap-tools composite action.  The yq version
        # and SHA below MUST be kept in sync with the parent repo's
        # .github/ci/tool-versions.lock (YQ_VERSION / YQ_SHA256).
        # The SHA may differ because tool-versions.lock may pin a different
        # artifact variant — verify both after any yq version bump.
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq
          jq --version
          YQ_VERSION="4.52.1"
          YQ_SHA256="bb7c52fbaeec8b208d7eb2e4e782bb56b83fa00b871aa3c7bfd1e33201446e25"
          sudo wget -q "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64" -O /usr/local/bin/yq
          echo "${YQ_SHA256}  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Preflight docker compose availability
        run: |
          set -euo pipefail
          command -v docker >/dev/null 2>&1 || {
            echo "docker is required but was not found in PATH."
            exit 1
          }
          docker compose version >/dev/null 2>&1 || {
            echo "docker compose plugin is required but is unavailable."
            exit 1
          }

      - name: Validate stack manifest and compose files
        run: .github/scripts/validate_stacks_manifest.sh
