name: Private Redeploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_portainer_tf_refresh:
        description: "Dispatch structural refresh even without compose add/remove/rename"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: private-redeploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  runner-guard:
    runs-on: ubuntu-latest
    outputs:
      runner_label: ${{ steps.verify.outputs.runner_label }}

    steps:
      - name: Verify cloud runner label is configured
        id: verify
        env:
          CLOUD_STATIC_RUNNER_LABEL: ${{ vars.CLOUD_STATIC_RUNNER_LABEL }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOUD_STATIC_RUNNER_LABEL:-}" ]]; then
            echo "Missing required variable: CLOUD_STATIC_RUNNER_LABEL"
            exit 1
          fi
          echo "runner_label=${CLOUD_STATIC_RUNNER_LABEL}" >> "${GITHUB_OUTPUT}"

  dispatch-meta-request:
    needs: [runner-guard]
    runs-on: ${{ needs.runner-guard.outputs.runner_label }}

    steps:
      - name: Checkout stacks repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print runner egress for traceability
        run: |
          set -euo pipefail
          ipv4="$(curl -4 -fsS --max-time 10 https://api.ipify.org || true)"
          ipv6="$(curl -6 -fsS --max-time 10 https://api64.ipify.org || true)"
          echo "Runner IPv4 egress: ${ipv4:-<unavailable>}"
          echo "Runner IPv6 egress: ${ipv6:-<unavailable>}"

      - name: Setup yq
        run: |
          sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Build redeploy request payload
        id: plan
        run: |
          set -euo pipefail

          normalize_csv() {
            local input="$1"
            if [[ -z "$input" ]]; then
              echo ""
              return
            fi

            IFS=',' read -ra parts <<< "$input"
            printf '%s\n' "${parts[@]}" \
              | awk '{$1=$1; print}' \
              | awk 'NF > 0' \
              | awk '!seen[$0]++' \
              | sort \
              | paste -sd, -
          }

          declare -A CHANGED_STACKS=()
          declare -A CONFIG_STACKS=()
          declare -A STRUCTURAL_PATHS=()

          STRUCTURAL_CHANGE=false
          REASON=""

          mapfile -t PORTAINER_STACKS < <(yq -r '.stacks | to_entries[] | select(.value.portainer_managed == true) | .key' stacks.yaml)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            for stack in "${PORTAINER_STACKS[@]}"; do
              CHANGED_STACKS["$stack"]=1
            done

            if [[ "${{ inputs.force_portainer_tf_refresh }}" == "true" ]]; then
              STRUCTURAL_CHANGE=true
              REASON="manual-refresh"
            fi
          else
            BEFORE_SHA="${{ github.event.before }}"
            AFTER_SHA="${{ github.sha }}"

            if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              CHANGED_FILES="$(git show --name-only --pretty='' "$AFTER_SHA")"
              CHANGED_STATUS="$(git show --name-status --pretty='' "$AFTER_SHA")"
            else
              CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
              CHANGED_STATUS="$(git diff --name-status "$BEFORE_SHA" "$AFTER_SHA")"
            fi

            while IFS= read -r file; do
              [[ -z "$file" ]] && continue

              for stack in "${PORTAINER_STACKS[@]}"; do
                compose_path="$(yq -r ".stacks.\"$stack\".compose_path" stacks.yaml)"
                stack_dir="$(dirname "$compose_path")"
                if [[ "$file" == "$stack_dir/"* || "$file" == "$compose_path" ]]; then
                  CHANGED_STACKS["$stack"]=1
                  if [[ "$stack" == "auth" && "$file" == "auth/config/"* ]]; then
                    CONFIG_STACKS["auth"]=1
                  fi
                  if [[ "$stack" == "observability" && "$file" == "observability/config/"* ]]; then
                    CONFIG_STACKS["observability"]=1
                  fi
                fi
              done
            done <<< "$CHANGED_FILES"

            while IFS=$'\t' read -r status old_path new_path; do
              [[ -z "$status" ]] && continue
              if [[ ! "$status" =~ ^(A|D|R) ]]; then
                continue
              fi

              for file in "$old_path" "$new_path"; do
                [[ -z "$file" ]] && continue
                for stack in "${PORTAINER_STACKS[@]}"; do
                  compose_path="$(yq -r ".stacks.\"$stack\".compose_path" stacks.yaml)"
                  if [[ "$file" == "$compose_path" ]]; then
                    STRUCTURAL_CHANGE=true
                    STRUCTURAL_PATHS["$file"]=1
                  fi
                done
              done
            done <<< "$CHANGED_STATUS"

            if [[ "$STRUCTURAL_CHANGE" == "true" ]]; then
              REASON="structural-change"
            fi
          fi

          changed_stacks_csv=""
          config_stacks_csv=""
          changed_paths_csv=""

          if [[ "${#CHANGED_STACKS[@]}" -gt 0 ]]; then
            changed_stacks_csv="$(printf '%s\n' "${!CHANGED_STACKS[@]}" | sort | paste -sd, -)"
          fi
          if [[ "${#CONFIG_STACKS[@]}" -gt 0 ]]; then
            config_stacks_csv="$(printf '%s\n' "${!CONFIG_STACKS[@]}" | sort | paste -sd, -)"
          fi
          if [[ "${#STRUCTURAL_PATHS[@]}" -gt 0 ]]; then
            changed_paths_csv="$(printf '%s\n' "${!STRUCTURAL_PATHS[@]}" | sort | paste -sd, -)"
          fi

          changed_stacks_csv="$(normalize_csv "$changed_stacks_csv")"
          config_stacks_csv="$(normalize_csv "$config_stacks_csv")"
          changed_paths_csv="$(normalize_csv "$changed_paths_csv")"

          if [[ -z "$REASON" && -n "$changed_stacks_csv" ]]; then
            REASON="content-change"
          fi
          if [[ -z "$REASON" ]]; then
            REASON="no-op"
          fi

          echo "changed_stacks=$changed_stacks_csv" >> "$GITHUB_OUTPUT"
          echo "config_stacks=$config_stacks_csv" >> "$GITHUB_OUTPUT"
          echo "structural_change=$STRUCTURAL_CHANGE" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "changed_paths=$changed_paths_csv" >> "$GITHUB_OUTPUT"

          echo "Changed stacks: ${changed_stacks_csv:-<none>}"
          echo "Config stacks: ${config_stacks_csv:-<none>}"
          echo "Structural change: ${STRUCTURAL_CHANGE}"
          echo "Reason: ${REASON}"
          echo "Changed paths: ${changed_paths_csv:-<none>}"

      - name: Dispatch stacks-redeploy-requested to infra repo
        if: ${{ steps.plan.outputs.changed_stacks != '' || steps.plan.outputs.structural_change == 'true' }}
        env:
          INFRA_REPO: ${{ vars.INFRA_REPO || 'JoseStud/GoodOldMeServer' }}
          DISPATCH_TOKEN: ${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}
          STACKS_SHA: ${{ github.sha }}
          CHANGED_STACKS: ${{ steps.plan.outputs.changed_stacks }}
          CONFIG_STACKS: ${{ steps.plan.outputs.config_stacks }}
          STRUCTURAL_CHANGE: ${{ steps.plan.outputs.structural_change }}
          REASON: ${{ steps.plan.outputs.reason }}
          CHANGED_PATHS: ${{ steps.plan.outputs.changed_paths }}
        run: |
          set -euo pipefail

          if [[ -z "${DISPATCH_TOKEN:-}" ]]; then
            echo "Missing secret INFRA_REPO_DISPATCH_TOKEN."
            exit 1
          fi

          curl -sSfL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            "https://api.github.com/repos/${INFRA_REPO}/dispatches" \
            -d "$(cat <<EOF_JSON
          {
            "event_type": "stacks-redeploy-requested",
            "client_payload": {
              "stacks_sha": "${STACKS_SHA}",
              "changed_stacks": "${CHANGED_STACKS}",
              "config_stacks": "${CONFIG_STACKS}",
              "structural_change": ${STRUCTURAL_CHANGE},
              "reason": "${REASON}",
              "changed_paths": "${CHANGED_PATHS}"
            }
          }
          EOF_JSON
          )"
