# /etc/infisical-agent/infisical-agent.yaml
# Managed by Ansible

infisical:
  auth:
    type: "universal-auth"
    config:
      client-id: ""
      client-secret: ""

  cache:
    backend: "local"
    path: "/var/lib/infisical/cache"
    ttl: "168h" # Cache secrets for 1 week offline

  templates:
    - source-path: "/opt/stacks/vaultwarden/vaultwarden.env.tmpl"
      destination-path: "/opt/stacks/vaultwarden/.env"
      # Auto-Healing: Agent fetches secrets on interval or webhook
      exec:
        command: "cd /opt/stacks/vaultwarden && docker compose up -d"
        restart-on-error: true

