# /etc/infisical/agent.yaml
# Managed by Ansible from the stacks repository.

infisical:
  address: {{ runtime_sync_infisical_domain | to_json }}

auth:
  type: "universal-auth"
  config:
    client-id: {{ runtime_sync_agent_client_id_path | to_json }}
    client-secret: {{ runtime_sync_agent_client_secret_path | to_json }}
    remove_client_secret_on_read: false

templates:
  # Gateway — Traefik + socket-proxy
  # Host-rendered env file for break-glass direct deploys; the Portainer stack
  # environment itself is managed via Terraform.
  - source-path: "/opt/stacks/gateway/.env.tmpl"
    destination-path: "/opt/stacks/gateway/.env"
    config:
      polling-interval: 60s

  # Identity — Authelia SSO
  # Host-rendered env file for break-glass direct deploys; the Portainer stack
  # environment itself is managed via Terraform.
  - source-path: "/opt/stacks/auth/.env.tmpl"
    destination-path: "/opt/stacks/auth/.env"
    config:
      polling-interval: 60s

  # Identity — Authelia users database
  - source-path: "/opt/stacks/auth/config/users_database.yml.tmpl"
    destination-path: "/opt/stacks/auth/config/users_database.rendered.yml"
    config:
      polling-interval: 60s
      execute:
        command: >-
          {% if inventory_hostname == runtime_sync_primary_manager -%}
          {{ runtime_sync_auth_users_sync_helper_path }} /opt/stacks/auth/config/users_database.rendered.yml
          {%- else -%}
          /bin/sh -lc 'echo "Skipping auth users sync on {{ inventory_hostname }}; primary manager is {{ runtime_sync_primary_manager }}."; exit 0'
          {%- endif %}
        timeout: 60

  # Management — Homarr + Portainer
  - source-path: "/opt/stacks/management/.env.tmpl"
    destination-path: "/opt/stacks/management/.env"
    config:
      polling-interval: 60s
      execute:
        command: >-
          {% if inventory_hostname == runtime_sync_primary_manager -%}
          /bin/sh -c 'set -a; . /opt/stacks/management/.env; set +a; docker stack deploy -c /opt/stacks/management/docker-compose.yml management'
          {%- else -%}
          /bin/sh -lc 'echo "Skipping management deploy on {{ inventory_hostname }}; primary manager is {{ runtime_sync_primary_manager }}."; exit 0'
          {%- endif %}
        timeout: 60

  # Network — Vaultwarden + Pi-hole + Orbital Sync
  # Host-rendered env file for break-glass direct deploys; the Portainer stack
  # environment itself is managed via Terraform.
  - source-path: "/opt/stacks/network/.env.tmpl"
    destination-path: "/opt/stacks/network/.env"
    config:
      polling-interval: 60s

  # Observability — Prometheus + Loki + Grafana
  # Host-rendered env file for break-glass direct deploys; the Portainer stack
  # environment itself is managed via Terraform.
  - source-path: "/opt/stacks/observability/.env.tmpl"
    destination-path: "/opt/stacks/observability/.env"
    config:
      polling-interval: 60s

  # Observability — Alertmanager config
  - source-path: "/opt/stacks/observability/config/alertmanager.yml.tmpl"
    destination-path: "/opt/stacks/observability/config/alertmanager.rendered.yml"
    config:
      polling-interval: 60s
      execute:
        command: >-
          {% if inventory_hostname == runtime_sync_primary_manager -%}
          {{ runtime_sync_observability_alertmanager_sync_helper_path }} /opt/stacks/observability/config/alertmanager.rendered.yml
          {%- else -%}
          /bin/sh -lc 'echo "Skipping observability Alertmanager sync on {{ inventory_hostname }}; primary manager is {{ runtime_sync_primary_manager }}."; exit 0'
          {%- endif %}
        timeout: 60

  # AI Interface — Open WebUI + OpenClaw
  # Host-rendered env file for break-glass direct deploys; the Portainer stack
  # environment itself is managed via Terraform.
  - source-path: "/opt/stacks/media/ai-interface/.env.tmpl"
    destination-path: "/opt/stacks/media/ai-interface/.env"
    config:
      polling-interval: 60s

  # Uptime — Uptime Kuma
  # Host-rendered env file for break-glass direct deploys; the Portainer stack
  # environment itself is managed via Terraform.
  - source-path: "/opt/stacks/uptime/.env.tmpl"
    destination-path: "/opt/stacks/uptime/.env"
    config:
      polling-interval: 60s

  # Cloud — FileBrowser
  # Host-rendered env file for break-glass direct deploys; the Portainer stack
  # environment itself is managed via Terraform.
  - source-path: "/opt/stacks/cloud/.env.tmpl"
    destination-path: "/opt/stacks/cloud/.env"
    config:
      polling-interval: 60s
