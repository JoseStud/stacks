version: '3.8'

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    volumes:
      - /mnt/swarm-shared/uptime-kuma/data:/app/data
    networks:
      - traefik_proxy
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.uptime-kuma.rule=Host(`status.${BASE_DOMAIN}`)"
        - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
        - "traefik.http.routers.uptime-kuma.middlewares=authelia@docker"
        - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  traefik_proxy:
    external: true
